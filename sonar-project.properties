# sonar.projectKey and sonar.organization are configured for this repository.
# If you create your own project on https://sonarcloud.io, update these values accordingly.

sonar.projectKey=marcus-vreis_VisionForge
sonar.organization=marcus-vreis

sonar.projectName=VisionForge
sonar.projectVersion=0.0.1

# Source and test directories
sonar.sources=src/
sonar.tests=tests/
sonar.inclusions=src/**/*.py

# Python coverage report (generated by pytest-cov --cov-report=xml)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8
