# ==============================================================================
# configs/baseline.yaml
#
# Baseline experiment — ResNet50 binary classification.
# Copy and rename this file for each new experiment.
# ==============================================================================
 
name: resnet50_baseline
task: binary  # binary | multiclass
 
model:
  name: resnet50
  num_classes: 1      # binary → always 1
  pretrained: true
 
training:
  learning_rate: 0.0001
  epochs: 100
  batch_size: 16      # must be a power of 2
  early_stopping_patience: 10
  optimizer: adam     # adam | sgd | adamw
  weight_decay: 0.0
 
data:
  base_dir: datasets/USK-Coffee_Binary
  train_dir: train
  val_dir: val
  test_dir: test
  image_size: 224
  num_workers: 4
  pin_memory: true
 
output:
  models_dir: outputs/models
  graphics_dir: outputs/graphics
  logs_dir: outputs/logs
  reports_dir: outputs/reports