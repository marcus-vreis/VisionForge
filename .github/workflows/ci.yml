name: Code quality

on:
  push:
    branches: ["main", "develop"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: pre-commit/action@v3.0.1
        env:
          SKIP: pytest

  pre-commit-check-hooks-versions:
    name: pre-commit-check-hooks-versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install pre-commit
        run: pip install pre-commit --quiet
      - name: Detect outdated hook versions
        run: |
          pre-commit autoupdate
          if ! git diff --quiet .pre-commit-config.yaml; then
            echo "::warning::Some hooks have newer versions. Run: pre-commit autoupdate"
            git checkout .pre-commit-config.yaml
          fi

  main:
    name: main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Spell check (codespell)
        run: |
          source .venv/bin/activate
          codespell src/ tests/ *.md *.toml

      - name: Lint (ruff)
        run: |
          source .venv/bin/activate
          ruff check src/ tests/

      - name: Format check (ruff format)
        run: |
          source .venv/bin/activate
          ruff format --check src/ tests/

      - name: Type check (mypy)
        run: |
          source .venv/bin/activate
          mypy src/

      - name: Check version bump on PR
        if: github.event_name == 'pull_request'
        run: |
          source .venv/bin/activate
          BASE_VERSION=$(git show origin/${{ github.base_ref }}:pyproject.toml \
            | grep '^version' | head -1 | sed 's/version = "//;s/"//')
          PR_VERSION=$(grep '^version' pyproject.toml | head -1 \
            | sed 's/version = "//;s/"//')
          echo "Base: $BASE_VERSION  →  PR: $PR_VERSION"
          if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
            echo "::warning::Version not bumped. Run: bump-my-version bump patch"
          fi

  tests:
    name: tests
    runs-on: ubuntu-latest
    needs: main

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: |
          uv venv
          source .venv/bin/activate
          uv pip install -e ".[dev]"
          uv pip install torch torchvision --index-url https://download.pytorch.org/whl/cpu

      - name: Run tests
        run: |
          source .venv/bin/activate
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=70

      - name: Upload coverage XML (for SonarCloud)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 1

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Download HTML coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-html
          path: htmlcov/

      - name: Publish coverage report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

  sonarqube:
    name: sonarqube
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download coverage XML
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: SonarCloud scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.python.coverage.reportPaths=coverage.xml